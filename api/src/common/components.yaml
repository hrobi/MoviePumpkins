      description: login required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ServiceError"
    403:
      description: user not authorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ServiceError"
    404:
      description: resource not found
