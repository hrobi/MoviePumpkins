openapi: 3.0.2
info:
  title: MoviePumpkins
  description: MoviePumpkins
  version: 1.0.0
paths: {}
components:
  responses:
    400:
      description: bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ServiceError"
